<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Check Me — Results</title>
<link rel="stylesheet" href="css/app.css"/>
<style>
.results-grid { display:grid; grid-template-columns:1fr 340px; gap:20px; }
.driver-row   { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.driver-lbl   { font-size:11px; font-weight:700; color:var(--dk-grey); width:160px; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
.driver-track { flex:1; height:6px; background:var(--lt-grey); border-radius:99px; overflow:hidden; }
.driver-fill  { height:100%; border-radius:99px; transition:width 0.6s ease; }
.driver-val   { font-size:11px; font-weight:700; color:var(--mid-grey); width:44px; text-align:right; }
.no-result    { text-align:center; padding:80px 20px; color:var(--mid-grey); }
.no-result h2 { font-family:var(--font-head); font-size:22px; font-weight:800; color:var(--dk-grey); margin-bottom:10px; }
.band-chip    { display:inline-block; padding:3px 10px; border-radius:4px; font-weight:800; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; }
</style>
</head>
<body>
<div class="shell">
  <div id="sb"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Results</div>
      <div class="topbar-sep"></div>
      <div class="topbar-sub" id="result-band-badge">—</div>
      <div class="topbar-right">
        <a href="assess.html" class="btn btn-primary">+ New Assessment</a>
        <button class="btn btn-ghost" onclick="window.print()">Export</button>
      </div>
    </div>
    <div class="page" id="page-content">
      <div class="no-result">
        <h2>No Assessment Yet</h2>
        <p style="margin-bottom:20px;">Complete an assessment or load an example patient to see results here.</p>
        <a href="assess.html" class="btn btn-primary">Start Assessment →</a>
      </div>
    </div>
  </div>
</div>
<script src="js/model.js"></script>
<script>
document.getElementById('sb').innerHTML = buildSidebar('results');
const res = loadResult();
if (res) renderResult(res);

function renderResult(res) {
  // Normalise field names — API returns risk_tier/risk_score, local fallback returns tier/prob
  const tier       = res.tier       || res.risk_tier || 'GREEN';
  const prob       = (res.prob      != null) ? res.prob : (res.risk_score ?? 0);
  const confidence = res.confidence || 'N/A';
  const source     = res.source     || 'api';

  // Flags: API → {id, condition, rationale, urgency}  |  local → {id, label, rationale, urgency}
  const rawFlags = res.clinical_flags || res.flags || [];
  const flags = rawFlags.map(f => ({
    urgency:   f.urgency,
    label:     f.condition || f.label || f.id,
    rationale: f.rationale || '',
  }));

  const cfg   = TIER_CFG[tier] || TIER_CFG['GREEN'];
  const recs  = (res.recommendations && res.recommendations.length) ? res.recommendations : (TIER_RECS[tier]?.recs  || []);
  const steps = (res.next_steps      && res.next_steps.length)      ? res.next_steps      : (TIER_RECS[tier]?.steps || []);

  // Feature importance bars
  let driversHTML = '';
  if (res.top_features && res.top_features.length) {
    const maxImp = Math.max(...res.top_features.map(f => Math.abs(f.importance)), 0.0001);
    driversHTML = res.top_features.map(f => `
      <div class="driver-row">
        <div class="driver-lbl">${(f.description || f.feature || '').replace(/_/g,' ')}</div>
        <div class="driver-track"><div class="driver-fill" style="width:${(Math.abs(f.importance)/maxImp*100).toFixed(1)}%;background:${cfg.color};"></div></div>
        <div class="driver-val">${(f.importance * 100).toFixed(3)}</div>
      </div>`).join('');
  } else {
    const maxImp = Math.max(...Object.values(GLOBAL_IMP), 0.0001);
    driversHTML = Object.entries(GLOBAL_IMP).slice(0, 8).map(([f, imp]) => `
      <div class="driver-row">
        <div class="driver-lbl">${f.replace(/_/g,' ')}</div>
        <div class="driver-track"><div class="driver-fill" style="width:${(imp/maxImp*100).toFixed(1)}%;background:${cfg.color};"></div></div>
        <div class="driver-val">${(imp * 100).toFixed(3)}</div>
      </div>`).join('');
  }

  // Update topbar badge
  document.getElementById('result-band-badge').innerHTML =
    `<span class="band-chip" style="background:${cfg.color};color:white;">${cfg.label}</span>
     <span style="margin-left:8px;color:var(--mid-grey);font-size:12px;">${cfg.sub}</span>`;

  // Flags
  const flagsHTML = flags.length
    ? flags.map(f => `
        <div class="flag-card ${f.urgency.toLowerCase()}">
          <div class="flag-urg">${f.urgency}</div>
          <div class="flag-cond">${f.label}</div>
          <div class="flag-rat">${f.rationale}</div>
        </div>`).join('')
    : '<p style="font-size:13px;color:var(--mid-grey);padding:8px 0;">No clinical safety flags triggered for this patient.</p>';

  // Recommendations
  const recsHTML = recs.map((r, i) => `
    <div class="cat-row clickable" onclick="this.querySelector('.cat-expand').classList.toggle('open')">
      <div class="cat-badge badge-${cfg.badge}">${i+1}</div>
      <div class="cat-info">
        <div class="cat-title c-${cfg.badge}">${r.replace('⚠️ ','').replace('⚠ ','').substring(0,65)}${r.length>65?'…':''}</div>
        <div class="cat-sub">Click to expand full guidance</div>
      </div>
      <div style="padding:0 14px;font-size:20px;color:var(--lt-grey);display:flex;align-items:center;">›</div>
      <div class="cat-expand">${r}</div>
    </div>`).join('');

  // Next steps
  const stepsHTML = steps.map((s, i) => `
    <div class="cat-row">
      <div class="cat-badge badge-F">${i+1}</div>
      <div class="cat-info">
        <div class="cat-title" style="color:var(--text);font-size:14px;">${s}</div>
        <div class="cat-sub">Action Item</div>
      </div>
    </div>`).join('');

  // Patient summary
  const st = res.state || {};
  const fnaRows = [
    ['Worst Area (µm²)',       (st.worst_area             ?? '—')],
    ['Worst Concave Pts',      (st.worst_concave_points   ?? '—')],
    ['Mean Concave Pts',       (st.mean_concave_points    ?? '—')],
    ['Worst Concavity',        (st.worst_concavity        ?? '—')],
    ['Mean Radius',            (st.mean_radius            ?? '—')],
  ];
  const clinRows = [
    ['Age',             (st.age ?? '—') + ' yrs'],
    ['BMI',             (st.bmi ?? '—') + ' kg/m²'],
    ['Alcohol',         (st.alcohol_drinks_week ?? 0) + ' drinks/wk'],
    ['Family history',  st.family_history_bc ? 'Yes' : 'No'],
    ['BRCA mutation',   st.brca_mutation     ? 'Yes' : 'No'],
    ['Prior biopsy',    st.prior_biopsy      ? 'Yes' : 'No'],
    ['HRT use',         st.hrt_use           ? 'Yes' : 'No'],
    ['Dense breast',    st.dense_breast      ? 'Yes' : 'No'],
    ['Palpable lump',   st.palpable_lump     ? 'Yes' : 'No'],
    ['Nipple discharge',st.nipple_discharge  ? 'Yes' : 'No'],
    ['Skin changes',    st.skin_changes      ? 'Yes' : 'No'],
  ];
  const mkRow = ([k,v]) => `
    <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--lt-grey);">
      <span style="font-size:13px;color:var(--dk-grey);">${k}</span>
      <span style="font-size:13px;font-weight:700;color:var(--text);">${v}</span>
    </div>`;

  const sourceBadge = source === 'local_fallback'
    ? ''
    : '';

  document.getElementById('page-content').innerHTML = `
    <div class="result-hero fi" style="background:linear-gradient(135deg,${cfg.color}cc,${cfg.color});">
      <div class="rh-label">OVERALL RISK RESULT ${sourceBadge}</div>
      <div class="rh-tier">${cfg.label}</div>
      <div class="rh-sub">${cfg.sub}</div>
      ${tier === 'RED' ? '<div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:10px 16px;margin-top:10px;font-size:13px;line-height:1.55;max-width:500px;">Remember: this is <strong>not a diagnosis</strong>. Getting checked early is the right move — most breast changes turn out to be benign.</div>' : ''}
      <div class="rh-pills">
        <span class="rh-pill">${flags.length > 0 ? flags.length + ' clinical flag' + (flags.length !== 1 ? 's' : '') + ' noted' : 'No clinical flags'}</span>
        <span class="rh-pill">${confidence === 'HIGH' ? 'Strong signal' : confidence === 'MODERATE' ? 'Moderate signal' : 'Mild signal'}</span>
        <span class="rh-pill">Not a diagnosis</span>
      </div>
    </div>

    <div class="results-grid fi fi-1">
      <!-- Left column -->
      <div>
        ${flags.length ? `
          <div class="sec-label">Clinical Safety Flags</div>
          ${flagsHTML}
          <div style="margin-bottom:20px;"></div>` : ''}

        <div class="sec-label">Recommendations</div>
        ${recsHTML}
        <div style="margin-top:20px;"></div>

        <div class="sec-label">Next Steps</div>
        ${stepsHTML}
        <div style="margin-top:20px;"></div>

        <div class="sec-label">Key Risk Drivers <span style="font-size:10px;font-weight:400;color:var(--mid-grey);text-transform:none;letter-spacing:0;">Permutation importance · AUC drop</span></div>
        <div class="card">
          <div class="card-body">
            ${driversHTML}
            <p style="font-size:11px;color:var(--mid-grey);margin-top:10px;">These measurements from the assessment are the strongest signals in your result. They are based on real clinical data, not a diagnosis.</p>
          </div>
        </div>

        <div style="margin-top:16px;">
          <div class="disclaimer"><strong>This is not a diagnosis.</strong> Check Me is a self-screening support tool only. It cannot tell you whether you have or don't have cancer. For any concerns, please consult a healthcare professional. Based on: ACS 2023 · NICE NG101 · BI-RADS 5th Edition.</div>
        </div>
      </div>

      <!-- Right column -->
      <div>
        <div class="sec-label">Clinical Factors</div>
        <div class="card">
          <div class="card-body" style="padding:0 20px;">${clinRows.map(mkRow).join('')}</div>
        </div>

        <div style="margin-top:16px;">
          <div class="sec-label">Key FNA Values</div>
          <div class="card">
            <div class="card-body" style="padding:0 20px;">${fnaRows.map(mkRow).join('')}</div>
          </div>
        </div>

        <div style="margin-top:16px;">
          <div class="card">
            <div class="card-head"><span class="card-head-title">Actions</span></div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:10px;">
              <a href="assess.html" class="btn btn-primary" style="justify-content:center;">+ New Assessment</a>
              <a href="index.html"  class="btn btn-ghost"   style="justify-content:center;">← Dashboard</a>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>

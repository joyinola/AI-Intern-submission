server {
    listen 80;
    server_name localhost;

    # ── Static UI ──────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ──────────────────────────────────────────
    # Proxy /api/* → FastAPI at http://api:8000/*
    # The trailing slash on proxy_pass strips the /api prefix.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Tell FastAPI its root path is /api so Swagger UI generates
        # correct URLs in openapi.json (servers block, operationIds, etc.)
        proxy_set_header   X-Forwarded-Prefix /api;

        # Rewrite redirect Location headers to keep /api prefix
        proxy_redirect     http://api:8000/ /api/;
    }

    # FastAPI Swagger UI fetches /openapi.json directly (no /api prefix).
    # Catch that absolute path and proxy it to the API container.
    location = /openapi.json {
        proxy_pass        http://api:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header  Host $host;
    }
}
